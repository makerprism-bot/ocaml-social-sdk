name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and test

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubicloud-standard-2
          - macos-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        run: sudo apt update && sudo apt-get install -y libev-dev libgmp-dev libssl-dev pkg-config
        if: runner.os == 'Linux'

      - name: Install system dependencies (macOS)
        run: brew install libev gmp openssl@3 pkg-config
        if: runner.os == 'macOS'

      - name: Setup Dune
        uses: ocaml-dune/setup-dune@v1
        with:
          version: latest

      - name: Lock dependencies
        run: dune pkg lock

      - name: Build project
        run: dune build

      - name: Run tests
        run: dune runtest

      - name: Verify package metadata in isolation
        run: |
          for pkg in \
            social-core \
            social-lwt \
            social-refresh \
            social-twitter-v2 \
            social-bluesky-v1 \
            social-linkedin-v2 \
            social-mastodon-v1 \
            social-facebook-graph-v21 \
            social-instagram-graph-v21 \
            social-youtube-data-v3 \
            social-pinterest-v5 \
            social-tiktok-v1 \
            social-reddit-v1 \
            social-threads-v1 \
            social-telegram-bot-v1
          do
            echo "Checking $pkg"
            if [ "$pkg" = "social-core" ]; then
              only_packages="$pkg"
            else
              only_packages="social-core,$pkg"
            fi
            dune pkg lock --only-packages="$only_packages"
            dune build --only-packages="$only_packages" @pkg-install
          done
